version: '3.8'

services:

  # --------------------------------------------------
  # MySQL Database Service
  # --------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: semaphore-mysql

    # Always restart unless manually stopped
    restart: unless-stopped

    environment:
      # Root password for MySQL (change in production)
      MYSQL_ROOT_PASSWORD: semaphore_root_pass

      # Database that Semaphore will use
      MYSQL_DATABASE: semaphore

      # Application user for Semaphore
      MYSQL_USER: semaphore
      MYSQL_PASSWORD: semaphore_pass

    # Use Docker-managed volume (avoids QNAP filesystem issues)
    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - semaphore-net


  # --------------------------------------------------
  # Semaphore (Ansible UI) Service
  # --------------------------------------------------
  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore

    restart: unless-stopped

    # Expose container port 3000 to host port 3001
    # Change 3001 if needed
    ports:
      - "3001:3000"

    environment:
      # -------------------------------
      # Database Configuration
      # -------------------------------
      SEMAPHORE_DB_DIALECT: mysql
      SEMAPHORE_DB_HOST: mysql          # must match service name above
      SEMAPHORE_DB_NAME: semaphore
      SEMAPHORE_DB_USER: semaphore
      SEMAPHORE_DB_PASS: semaphore_pass

      # -------------------------------
      # Initial Admin User
      # (only used on first startup)
      # -------------------------------
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_PASSWORD: admin
      SEMAPHORE_ADMIN_NAME: Admin
      SEMAPHORE_ADMIN_EMAIL: admin@localhost

      # -------------------------------
      # CRITICAL: bind to all interfaces
      # without this, UI may not be reachable
      # -------------------------------
      SEMAPHORE_BIND: 0.0.0.0

    # Ensure MySQL starts first
    depends_on:
      - mysql

    networks:
      - semaphore-net


# --------------------------------------------------
# Persistent Storage
# --------------------------------------------------
volumes:
  # Docker-managed volume (recommended over host mounts on QNAP)
  mysql_data:


# --------------------------------------------------
# Internal Network
# --------------------------------------------------
networks:
  semaphore-net:
