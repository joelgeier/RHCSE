version: "3.8"

services:
  semaphore-db:
    image: mysql:8.0
    container_name: semaphore-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: semaphore_root_pass
      MYSQL_DATABASE: semaphore
      MYSQL_USER: semaphore
      MYSQL_PASSWORD: semaphore_pass
    volumes:
      - /share/Container/semaphore-mysql:/var/lib/mysql

  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    restart: unless-stopped
    depends_on:
      - semaphore-db
    ports:
      - "3001:3000"   # changed from 3000 to avoid conflict
    environment:
      SEMAPHORE_DB_USER: semaphore
      SEMAPHORE_DB_PASS: semaphore_pass
      SEMAPHORE_DB_HOST: semaphore-db
      SEMAPHORE_DB_PORT: 3306
      SEMAPHORE_DB_DIALECT: mysql
      SEMAPHORE_DB: semaphore

      SEMAPHORE_PLAYBOOK_PATH: /tmp/semaphore/playbooks

      # 👇 FIXED ADMIN CONFIG
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_PASSWORD: admin
      SEMAPHORE_ADMIN_NAME: admin
      SEMAPHORE_ADMIN_EMAIL: admin@example.com

      SEMAPHORE_ACCESS_KEY_ENCRYPTION: "change_this_to_random_string"

    volumes:
      - /share/Container/semaphore:/var/lib/semaphore
